spring.application.name=StreamingAiChatBot
# ???????????????????????????????????????????
# Server
# ???????????????????????????????????????????
# Render injects PORT automatically.
# Locally it defaults to 8080.
server.port=${PORT:8080}

# ???????????????????????????????????????????
# OpenAI
# ???????????????????????????????????????????
# NEVER put your real key here.
# Set OPENAI_API_KEY as an environment variable
# on Render (and in your local terminal).
spring.ai.openai.api-key=${OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gpt-4o
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.chat.options.max-tokens=3000

# ???????????????????????????????????????????
# Conversation History (in-memory)
# ???????????????????????????????????????????
ai.conversation.max-history-size=50
ai.conversation.ttl-minutes=60

# ???????????????????????????????????????????
# CORS ? your Vercel frontend URL
# ???????????????????????????????????????????
# Set ALLOWED_ORIGINS env var on Render to:
#   https://your-app.vercel.app
# Comma-separate multiple origins if needed.
ai.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,https://flow-gen-ai-one.vercel.app}

# ???????????????????????????????????????????
# Actuator (Render health check)
# ???????????????????????????????????????????
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# ???????????????????????????????????????????
# Logging
# ???????????????????????????????????????????
logging.level.com.aichat=DEBUG
logging.level.root=INFO
